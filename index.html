<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>#ZeroPolioRDC - Générateur de Visuel</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'pev-blue': '#1e3a8a',
            'pev-orange': '#f97316',
          }
        }
      }
    }
  </script>

  <!-- React + Babel via jsDelivr, plus stable que unpkg sur certains réseaux -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js" crossorigin></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }

    input[type="range"] {
      accent-color: #1e3a8a;
    }

    .safe-shadow {
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
    }
  </style>
</head>

<body class="bg-gray-50">
  <noscript>
    <div style="padding:20px;font-family:Arial,sans-serif;color:#1e3a8a;">
      Activez JavaScript pour utiliser le générateur de visuel #ZeroPolioRDC.
    </div>
  </noscript>

  <div id="root">
    <div style="padding:24px;text-align:center;font-family:Arial,sans-serif;color:#1e3a8a;">
      Chargement du générateur...
    </div>
  </div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useRef, useEffect } = React;

    /*
      IMPORTANT POUR GITHUB PAGES
      Placez ces 3 fichiers à la racine du dépôt :
      - index.html
      - logo.png
      - filtre.png

      Les noms doivent être exactement en minuscules :
      logo.png et filtre.png
    */
    const ASSETS = {
      logo: './logo.png',
      filter: './filtre.png'
    };

    const CAMPAIGN_URL = window.location.origin + window.location.pathname.replace(/\/index\.html$/, '');

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const icons = {
        upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12"/>,
        zoom: <React.Fragment><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></React.Fragment>,
        move: <React.Fragment><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="22"/></React.Fragment>,
        rotate: <React.Fragment><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></React.Fragment>,
        image: <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></React.Fragment>,
        download: <React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m7-10 5 5-5 5m5-5H3"/></React.Fragment>,
        check: <React.Fragment><path d="M20 6 9 17l-5-5"/></React.Fragment>,
        copy: <React.Fragment><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></React.Fragment>
      };

      return (
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" strokeWidth="2"
          strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    function App() {
      const [userImage, setUserImage] = useState(null);
      const [zoom, setZoom] = useState(1);
      const [posX, setPosX] = useState(0);
      const [posY, setPosY] = useState(0);
      const [isExporting, setIsExporting] = useState(false);
      const [filterLoaded, setFilterLoaded] = useState(false);
      const [assetError, setAssetError] = useState(null);
      const [copied, setCopied] = useState(false);
      const [exportedImage, setExportedImage] = useState(null);

      const [isDragging, setIsDragging] = useState(false);
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

      const canvasRef = useRef(null);
      const fileInputRef = useRef(null);
      const previewRef = useRef(null);

      const message = `Bonjour à toutes et à tous 🙌🏾

Face à la poliomyélite en RDC, mobilisons-nous aux côtés du Ministère de la Santé pour protéger chaque enfant contre cette maladie.

Du 18 au 20 juin 2026, accueillons chaleureusement les vaccinateurs pour que chaque enfant de moins de 5 ans reçoive ses gouttes de vaccin salvatrices.

Chaque goutte compte ! Je viens de créer mon filtre d’engagement. Vous aussi, créez le vôtre et partagez-le pour sensibiliser votre entourage.

✅ Créez votre filtre d’engagement
✅ Partagez votre message de sensibilisation
✅ Ensemble, protégeons l'avenir de nos enfants

Créez votre filtre ici :
${CAMPAIGN_URL}

#ZeroPolioRDC #ChaqueGoutteCompte
Prévenons. Protégeons. Agissons.`;

      const isMobile = () => /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      const loadImage = (src) => {
        return new Promise((resolve, reject) => {
          if (!src) {
            reject(new Error("Source d'image vide."));
            return;
          }

          const img = new Image();
          img.decoding = 'async';

          img.onload = () => {
            if ((img.naturalWidth || img.width) > 0 && (img.naturalHeight || img.height) > 0) {
              resolve(img);
            } else {
              reject(new Error("Image chargée mais dimensions invalides."));
            }
          };

          img.onerror = () => reject(new Error("Impossible de charger l'image : " + src));
          img.src = src;
        });
      };

      useEffect(() => {
        let mounted = true;

        loadImage(ASSETS.filter)
          .then(() => {
            if (mounted) {
              setFilterLoaded(true);
              setAssetError(null);
            }
          })
          .catch((err) => {
            console.error(err);
            if (mounted) {
              setFilterLoaded(false);
              setAssetError("Le fichier filtre.png est introuvable ou mal nommé. Placez filtre.png à la racine du dépôt.");
            }
          });

        return () => {
          mounted = false;
        };
      }, []);

      useEffect(() => {
        const preview = previewRef.current;
        if (!preview) return;

        const handleTouchMove = (e) => {
          if (isDragging && userImage) {
            if (e.cancelable) e.preventDefault();
          }
        };

        preview.addEventListener('touchmove', handleTouchMove, { passive: false });
        return () => preview.removeEventListener('touchmove', handleTouchMove);
      }, [isDragging, userImage]);

      const handleStart = (e) => {
        if (!userImage) return;

        setIsDragging(true);

        const point = e.touches ? e.touches[0] : e;
        setDragStart({
          x: point.clientX,
          y: point.clientY
        });
      };

      const handleMove = (e) => {
        if (!isDragging || !userImage) return;

        const point = e.touches ? e.touches[0] : e;
        const deltaX = point.clientX - dragStart.x;
        const deltaY = point.clientY - dragStart.y;

        setPosX((prev) => prev + deltaX / zoom);
        setPosY((prev) => prev + deltaY / zoom);

        setDragStart({
          x: point.clientX,
          y: point.clientY
        });
      };

      const handleEnd = () => {
        setIsDragging(false);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          setUserImage(event.target.result);
          setZoom(1);
          setPosX(0);
          setPosY(0);
          setExportedImage(null);
        };
        reader.readAsDataURL(file);
      };

      const resetControls = () => {
        setZoom(1);
        setPosX(0);
        setPosY(0);
      };

      const generateDesignDataUrl = async () => {
        if (!userImage || !canvasRef.current || !previewRef.current) {
          throw new Error("Photo utilisateur ou canvas indisponible.");
        }

        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');

        if (!ctx) {
          throw new Error("Impossible d'initialiser le canvas.");
        }

        canvas.width = 1080;
        canvas.height = 1080;

        ctx.clearRect(0, 0, 1080, 1080);

        const img = await loadImage(userImage);

        const previewWidth = previewRef.current.clientWidth || 400;
        const scaleFactor = 1080 / previewWidth;

        ctx.save();
        ctx.translate(540, 540);
        ctx.scale(zoom, zoom);
        ctx.translate(posX * scaleFactor, posY * scaleFactor);

        const imgWidth = img.naturalWidth || img.width || 1080;
        const imgHeight = img.naturalHeight || img.height || 1080;
        const baseScale = Math.max(1080 / imgWidth, 1080 / imgHeight);
        const drawWidth = imgWidth * baseScale;
        const drawHeight = imgHeight * baseScale;

        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
        ctx.restore();

        const filterImg = await loadImage(ASSETS.filter);
        ctx.drawImage(filterImg, 0, 0, 1080, 1080);

        return canvas.toDataURL('image/jpeg', 0.92);
      };

      const downloadDataUrl = (dataUrl) => {
        const link = document.createElement('a');
        link.download = `ZeroPolioRDC_${Date.now()}.jpg`;
        link.href = dataUrl;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();

        setTimeout(() => {
          document.body.removeChild(link);
        }, 150);
      };

      const handleDownload = async () => {
        if (!userImage || isExporting) return;

        setIsExporting(true);

        try {
          const dataUrl = await generateDesignDataUrl();

          if (isMobile()) {
            setExportedImage(dataUrl);
          }

          downloadDataUrl(dataUrl);
        } catch (error) {
          console.error("Erreur d'exportation :", error);
          alert("Une erreur est survenue lors de la création de l'image. Vérifiez que filtre.png est bien à la racine du dépôt et rechargez la page.");
        } finally {
          setIsExporting(false);
        }
      };

      const copyMessage = async () => {
        try {
          await navigator.clipboard.writeText(message);
          setCopied(true);
          setTimeout(() => setCopied(false), 2500);
        } catch (err) {
          alert("Impossible de copier le message automatiquement. Vous pouvez le sélectionner manuellement.");
        }
      };

      const handleShare = async () => {
        if (!userImage) {
          alert("Veuillez d'abord ajouter votre photo.");
          return;
        }

        if (isExporting) return;
        setIsExporting(true);

        try {
          const dataUrl = await generateDesignDataUrl();

          const arr = dataUrl.split(',');
          const mimeMatch = arr[0].match(/:(.*?);/);
          const mime = mimeMatch ? mimeMatch[1] : 'image/jpeg';
          const bstr = atob(arr[1]);
          let n = bstr.length;
          const u8arr = new Uint8Array(n);

          while (n--) {
            u8arr[n] = bstr.charCodeAt(n);
          }

          const file = new File([u8arr], `ZeroPolioRDC_${Date.now()}.jpg`, { type: mime });

          if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
              files: [file],
              title: '#ZeroPolioRDC',
              text: message
            });
            return;
          }

          await copyMessage();
          setExportedImage(dataUrl);
          downloadDataUrl(dataUrl);

          const waUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
          window.open(waUrl, '_blank');
        } catch (error) {
          console.error("Erreur de partage :", error);

          try {
            await copyMessage();
          } catch (copyErr) {}

          const waUrl = `https://wa.me/?text=${encodeURIComponent(message)}`;
          window.open(waUrl, '_blank');
        } finally {
          setIsExporting(false);
        }
      };

      return (
        <div className="min-h-screen flex flex-col items-center bg-gray-50 pb-12 select-none">
          <header className="w-full bg-white shadow-md py-6 px-4 flex flex-col items-center space-y-4 border-b-4 border-pev-blue relative overflow-hidden">
            <div className="absolute top-0 right-0 w-32 h-32 bg-pev-orange/5 rounded-full -mr-16 -mt-16 pointer-events-none"></div>
            <div className="absolute bottom-0 left-0 w-24 h-24 bg-pev-blue/5 rounded-full -ml-12 -mb-12 pointer-events-none"></div>

            <img
              src={ASSETS.logo}
              alt="Logo"
              className="h-14 md:h-16 object-contain relative z-10"
              onError={() => setAssetError("Le fichier logo.png est introuvable ou mal nommé. Placez logo.png à la racine du dépôt.")}
            />

            <div className="text-center space-y-3 relative z-10 max-w-2xl">
              <h1 className="text-xl md:text-2xl font-extrabold text-pev-blue uppercase tracking-tight leading-[1.1]">
                Engageons-nous pour barrer la route à la <br className="hidden md:block" />
                <span className="text-pev-orange">Poliomyélite</span> en RDC
              </h1>

              <div className="inline-block bg-pev-blue/5 px-4 py-1.5 rounded-full border border-pev-blue/10">
                <p className="text-[10px] md:text-xs text-pev-blue font-bold uppercase tracking-[0.2em]">
                  Campagne Nationale de Vaccination • 18 au 20 Juin 2026
                </p>
              </div>

              <p className="text-xs md:text-sm text-gray-500 font-medium italic">
                "Chaque goutte compte ! Générez votre filtre d'engagement et protégeons nos enfants"
              </p>
            </div>
          </header>

          {assetError && (
            <div className="w-full max-w-md px-4 mt-4">
              <div className="bg-amber-50 border border-amber-200 text-amber-800 rounded-xl p-3 text-xs leading-relaxed">
                ⚠️ {assetError}
              </div>
            </div>
          )}

          <main className="w-full max-w-md px-4 mt-6 space-y-6">
            <div
              ref={previewRef}
              className={`relative aspect-square w-full bg-white rounded-2xl safe-shadow overflow-hidden border-4 border-white ${userImage ? 'cursor-grab active:cursor-grabbing' : 'cursor-pointer hover:scale-[1.01] active:scale-[0.99] transition-all duration-200 group'}`}
              onClick={() => {
                if (!userImage && fileInputRef.current) fileInputRef.current.click();
              }}
              onMouseDown={handleStart}
              onMouseMove={handleMove}
              onMouseUp={handleEnd}
              onMouseLeave={handleEnd}
              onTouchStart={handleStart}
              onTouchMove={handleMove}
              onTouchEnd={handleEnd}
            >
              <div className="absolute inset-0 z-0 flex items-center justify-center bg-gray-100 group-hover:bg-gray-200/40 transition-colors duration-200">
                {userImage ? (
                  <div
                    className="w-full h-full flex items-center justify-center pointer-events-none select-none"
                    style={{
                      transform: `scale(${zoom}) translate(${posX}px, ${posY}px)`,
                      transition: (isExporting || isDragging) ? 'none' : 'transform 0.1s ease-out'
                    }}
                  >
                    <img src={userImage} alt="Aperçu" className="max-w-none min-w-full min-h-full object-cover" />
                  </div>
                ) : (
                  <div className="flex flex-col items-center text-gray-400 group-hover:text-pev-blue transition-colors duration-200 text-center px-6">
                    <Icon name="upload" className="w-12 h-12 mb-2 opacity-20 group-hover:scale-110 group-hover:opacity-60 transition-all duration-200" />
                    <p className="text-sm font-bold text-gray-400 group-hover:text-pev-blue transition-colors duration-200">Importez votre photo</p>
                    <p className="text-xs text-gray-400 mt-1">Puis ajustez-la sous le filtre</p>
                  </div>
                )}
              </div>

              <div
                className="absolute inset-0 z-10 pointer-events-none"
                style={{
                  backgroundImage: `url(${ASSETS.filter})`,
                  backgroundSize: 'cover',
                  backgroundPosition: 'center'
                }}
              >
                {!filterLoaded && (
                  <div className="absolute inset-0 flex flex-col items-center justify-center bg-white/85">
                    <div className="w-12 h-12 border-4 border-pev-blue border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-xs text-pev-blue font-bold mt-3">Chargement du filtre...</p>
                  </div>
                )}
              </div>

              <canvas ref={canvasRef} className="hidden"></canvas>
            </div>

            <div className="bg-white rounded-2xl shadow-lg p-6 space-y-6 border border-gray-100">
              <div className="space-y-4">
                <div className="flex items-center justify-between">
                  <label className="text-xs font-bold text-pev-blue uppercase flex items-center">
                    <Icon name="zoom" className="w-4 h-4 mr-2" /> Agrandissez votre photo
                  </label>
                  <span className="text-xs font-mono font-bold text-pev-blue">{Math.round(zoom * 100)}%</span>
                </div>
                <input
                  type="range" min="0.5" max="3" step="0.01" value={zoom}
                  onChange={(e) => setZoom(parseFloat(e.target.value))}
                  disabled={!userImage}
                  className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer disabled:opacity-50"
                />
              </div>

              <div className="space-y-4">
                <label className="text-xs font-bold text-pev-blue uppercase flex items-center">
                  <Icon name="move" className="w-4 h-4 mr-2" /> Déplacez votre photo à gauche ou à droite
                </label>
                <input
                  type="range" min="-500" max="500" step="1" value={posX}
                  onChange={(e) => setPosX(parseInt(e.target.value))}
                  disabled={!userImage}
                  className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer disabled:opacity-50"
                />
              </div>

              <div className="space-y-4">
                <label className="text-xs font-bold text-pev-blue uppercase flex items-center">
                  <Icon name="move" className="w-4 h-4 mr-2" /> Déplacez votre photo en haut ou en bas
                </label>
                <input
                  type="range" min="-500" max="500" step="1" value={posY}
                  onChange={(e) => setPosY(parseInt(e.target.value))}
                  disabled={!userImage}
                  className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer disabled:opacity-50"
                />
              </div>

              <div className="space-y-3 pt-2">
                <div className="flex gap-3">
                  <button onClick={resetControls} className="p-3 rounded-xl border-2 border-gray-200 text-gray-400 hover:bg-gray-50 transition-colors flex items-center justify-center" title="Réinitialiser">
                    <Icon name="rotate" className="w-6 h-6" />
                  </button>

                  <button
                    onClick={() => fileInputRef.current && fileInputRef.current.click()}
                    className="flex-1 flex items-center justify-center gap-2 py-3 px-2 rounded-xl border-2 border-pev-blue text-pev-blue font-bold hover:bg-pev-blue/5 transition-all"
                  >
                    <Icon name="image" className="w-4 h-4 sm:w-5 sm:h-5" />
                    {userImage ? "Remplacer la photo" : "Ajouter votre photo"}
                  </button>
                </div>

                <button
                  onClick={handleDownload}
                  disabled={!userImage || isExporting}
                  className="w-full flex items-center justify-center gap-2 py-4 px-4 rounded-xl bg-pev-orange text-white font-bold shadow-lg shadow-pev-orange/30 hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed transition-transform"
                >
                  {isExporting ? (
                    <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                  ) : (
                    <><Icon name="download" className="w-5 h-5" /> Télécharger mon visuel</>
                  )}
                </button>

                <button
                  onClick={handleShare}
                  disabled={!userImage || isExporting}
                  className="w-full flex items-center justify-center gap-3 py-4 px-4 rounded-xl bg-[#25D366] text-white font-bold shadow-lg shadow-green-200 hover:scale-[1.01] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed transition-transform"
                >
                  <svg className="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.031 2a9.978 9.978 0 0 0-9.971 9.97c0 1.956.564 3.778 1.533 5.317L2 22l4.89-1.272A9.913 9.913 0 0 0 12.03 21a9.978 9.978 0 0 0 9.971-9.97A9.978 9.978 0 0 0 12.03 2zm-.029 1.688c4.549 0 8.245 3.696 8.245 8.282a8.216 8.216 0 0 1-8.245 8.281 8.255 8.255 0 0 1-4.223-1.16l-.303-.18-3.13.814.828-3.048-.198-.314a8.232 8.232 0 0 1-1.219-4.393c0-4.586 3.696-8.282 8.245-8.282zM8.342 6.777c-.161 0-.367.042-.544.207-.176.165-.676.66-.676 1.611 0 .95 1.01 1.87 1.151 2.057.142.186 1.942 3.125 4.814 4.254.683.268 1.217.428 1.631.543.687.21 1.312.18 1.805.111.55-.077 1.693-.681 1.93-1.338.236-.657.236-1.22.164-1.338-.071-.118-.268-.186-.56-.328-.291-.143-1.724-.836-1.99-.933-.266-.097-.46-.145-.658.144-.197.29-.763.933-.935 1.127-.172.193-.344.218-.636.075-.29-.143-1.23-.444-2.343-1.422-.866-.76-1.45-1.7-1.622-1.99-.172-.29-.018-.447.128-.59.13-.13.29-.338.437-.508.146-.17.195-.29.292-.483.097-.193.048-.363-.024-.508-.073-.145-.658-1.573-.902-2.153-.238-.567-.481-.49-.658-.499l-.56-.007z"/>
                  </svg>
                  Partager sur WhatsApp
                </button>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-lg p-5 space-y-4 border border-gray-100">
              <div className="flex items-center justify-between">
                <h3 className="text-xs font-bold text-pev-blue uppercase tracking-wider">Message d'accompagnement</h3>
                <button
                  onClick={copyMessage}
                  className="text-xs bg-gray-100 hover:bg-gray-200 text-pev-blue font-bold py-1 px-3 rounded-lg flex items-center gap-1 transition-colors"
                >
                  {copied ? <><Icon name="check" className="w-3.5 h-3.5 text-green-600" /> Copié</> : <><Icon name="copy" className="w-3.5 h-3.5" /> Copier</>}
                </button>
              </div>

              <div className="bg-gray-50 p-3 rounded-xl border border-gray-200">
                <pre className="text-[11px] text-gray-600 font-mono whitespace-pre-wrap max-h-32 overflow-y-auto leading-relaxed">{message}</pre>
              </div>
            </div>
          </main>

          {exportedImage && (
            <div className="fixed inset-0 bg-black/85 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-gray-100 flex flex-col items-center space-y-4 text-center">
                <h4 className="text-base font-extrabold text-gray-950 uppercase tracking-tight">
                  Visuel prêt ✅
                </h4>

                <p className="text-xs text-gray-500 leading-normal">
                  Si le téléchargement automatique ne s'ouvre pas, faites un appui long sur l'image ci-dessous pour l'enregistrer.
                </p>

                <div className="w-full aspect-square relative rounded-xl overflow-hidden border-2 border-dashed border-gray-300 shadow-md">
                  <img src={exportedImage} alt="Votre engagement ZeroPolioRDC" className="w-full h-full object-cover select-all cursor-pointer" />
                </div>

                <button
                  onClick={() => setExportedImage(null)}
                  className="w-full py-3 bg-pev-blue text-white font-bold rounded-xl active:scale-95 transition-all text-xs hover:bg-pev-blue/90"
                >
                  J'ai enregistré mon visuel
                </button>
              </div>
            </div>
          )}

          <input
            ref={fileInputRef}
            type="file"
            accept="image/*"
            onChange={handleImageUpload}
            className="hidden"
          />

          <footer className="mt-8 text-center text-gray-400 text-xs px-6 max-w-md">
            <p>Note : Pour un résultat optimal, utilisez une photo bien éclairée.</p>
            <p className="mt-2">© 2026 Ministère de la Santé - RDC</p>
          </footer>
        </div>
      );
    }

    try {
      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    } catch (error) {
      console.error("Erreur de démarrage React :", error);
      document.getElementById('root').innerHTML = `
        <div style="padding:20px;font-family:Arial,sans-serif;color:#991b1b;background:#fef2f2;">
          <strong>Erreur de chargement.</strong><br>
          Rechargez la page. Si le problème continue, vérifiez la console du navigateur.
        </div>
      `;
    }
  </script>
</body>
</html>
