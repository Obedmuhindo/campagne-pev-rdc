<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#StopPolioRDC - Générateur de Visuel</title>
    
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pev-blue': '#1e3a8a',
                        'pev-orange': '#f97316',
                    }
                }
            }
        }
    </script>

    <!-- Bibliothèques React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        input[type="range"] {
            accent-color: #1e3a8a;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useRef, useEffect } = React;

        // Chemins vers vos images (doivent être dans le même dossier sur GitHub)
        const ASSETS = {
            logo: 'logo.png',
            filter: 'filtre.png'
        };

        // Composant Icône SVG simple pour éviter les conflits DOM
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m14-7-5-5-5 5m5-5v12"/>,
                zoom: <React.Fragment><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></React.Fragment>,
                move: <React.Fragment><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="22"/></React.Fragment>,
                rotate: <React.Fragment><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></React.Fragment>,
                image: <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></React.Fragment>,
                download: <React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m7-10 5 5-5 5m5-5H3"/></React.Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            const [userImage, setUserImage] = useState(null);
            const [zoom, setZoom] = useState(1);
            const [posX, setPosX] = useState(0);
            const [posY, setPosY] = useState(0);
            const [isExporting, setIsExporting] = useState(false);
            const [filterLoaded, setFilterLoaded] = useState(false);

            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);
            const previewRef = useRef(null);

            useEffect(() => {
                const img = new Image();
                img.src = ASSETS.filter;
                img.onload = () => setFilterLoaded(true);
                img.onerror = () => setFilterLoaded(false);
            }, []);

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setUserImage(event.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleDownload = async () => {
                if (!userImage || !canvasRef.current || !previewRef.current) return;
                setIsExporting(true);

                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;

                canvas.width = 1080;
                canvas.height = 1080;

                try {
                    ctx.clearRect(0, 0, 1080, 1080);

                    const img = new Image();
                    img.src = userImage;
                    await new Promise((resolve) => (img.onload = resolve));

                    const previewRect = previewRef.current.getBoundingClientRect();
                    const previewWidth = previewRect.width || 400;
                    const scaleFactor = 1080 / previewWidth;

                    const scale = Math.max(1080 / img.width, 1080 / img.height) * zoom;
                    const drawWidth = img.width * scale;
                    const drawHeight = img.height * scale;
                    
                    const x = (1080 - drawWidth) / 2 + (posX * scaleFactor);
                    const y = (1080 - drawHeight) / 2 + (posY * scaleFactor);

                    ctx.drawImage(img, x, y, drawWidth, drawHeight);

                    const filterImg = new Image();
                    filterImg.src = ASSETS.filter;
                    await new Promise((resolve) => {
                        filterImg.onload = resolve;
                        filterImg.onerror = () => resolve(null);
                    });

                    if (filterImg.complete && filterImg.naturalWidth > 0) {
                        ctx.drawImage(filterImg, 0, 0, 1080, 1080);
                    }

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                    const link = document.createElement('a');
                    link.download = `StopPolioRDC_${Date.now()}.jpg`;
                    link.href = dataUrl;
                    link.click();
                } catch (error) {
                    console.error("Erreur d'exportation:", error);
                    alert("Une erreur est survenue lors de la création de l'image.");
                } finally {
                    setIsExporting(false);
                }
            };

            const resetControls = () => {
                setZoom(1);
                setPosX(0);
                setPosY(0);
            };

            return (
                <div className="min-h-screen flex flex-col items-center bg-gray-50 pb-12">
                    <header className="w-full bg-white shadow-sm py-4 px-6 flex flex-col items-center space-y-3 border-b-4 border-pev-blue">
                        <img src={ASSETS.logo} alt="Logo" className="h-16 object-contain" />
                        <h1 className="text-xl md:text-2xl font-bold text-pev-blue text-center uppercase tracking-tight">
                            Générez votre visuel <span className="text-pev-orange">#StopPolioRDC</span>
                        </h1>
                    </header>

                    <main className="w-full max-w-md px-4 mt-6 space-y-6">
                        <div ref={previewRef} className="relative aspect-square w-full bg-white rounded-2xl shadow-2xl overflow-hidden border-4 border-white">
                            <div className="absolute inset-0 z-0 flex items-center justify-center bg-gray-100">
                                {userImage ? (
                                    <div 
                                        className="w-full h-full flex items-center justify-center"
                                        style={{ 
                                            transform: `scale(${zoom}) translate(${posX}px, ${posY}px)`,
                                            transition: isExporting ? 'none' : 'transform 0.1s ease-out'
                                        }}
                                    >
                                        <img src={userImage} alt="Aperçu" className="max-w-none min-w-full min-h-full object-cover" />
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center text-gray-400">
                                        <Icon name="upload" className="w-12 h-12 mb-2 opacity-20" />
                                        <p className="text-sm font-medium">Importez votre photo</p>
                                    </div>
                                )}
                            </div>

                            <div 
                                className="absolute inset-0 z-10 pointer-events-none"
                                style={{ 
                                    backgroundImage: `url(${ASSETS.filter})`, 
                                    backgroundSize: 'cover', 
                                    backgroundPosition: 'center' 
                                }}
                            >
                                {!filterLoaded && (
                                    <div className="absolute inset-0 flex items-center justify-center bg-white/80">
                                        <div className="w-12 h-12 border-4 border-pev-blue border-t-transparent rounded-full animate-spin"></div>
                                    </div>
                                )}
                            </div>
                            <canvas ref={canvasRef} className="hidden"></canvas>
                        </div>

                        <div className="bg-white rounded-2xl shadow-lg p-6 space-y-6 border border-gray-100">
                            <div className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <label className="text-xs font-bold text-pev-blue uppercase flex items-center">
                                        <Icon name="zoom" className="w-4 h-4 mr-2" /> Zoom
                                    </label>
                                    <span className="text-xs font-mono font-bold text-pev-blue">{Math.round(zoom * 100)}%</span>
                                </div>
                                <input 
                                    type="range" min="0.5" max="3" step="0.01" value={zoom} 
                                    onChange={(e) => setZoom(parseFloat(e.target.value))}
                                    className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                />
                            </div>

                            <div className="space-y-4">
                                <label className="text-xs font-bold text-pev-blue uppercase flex items-center">
                                    <Icon name="move" className="w-4 h-4 mr-2" /> Gauche / Droite
                                </label>
                                <input 
                                    type="range" min="-200" max="200" step="1" value={posX} 
                                    onChange={(e) => setPosX(parseInt(e.target.value))}
                                    className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                />
                            </div>

                            <div className="space-y-4">
                                <label className="text-xs font-bold text-pev-blue uppercase flex items-center">
                                    <Icon name="move" className="w-4 h-4 mr-2" /> Haut / Bas
                                </label>
                                <input 
                                    type="range" min="-200" max="200" step="1" value={posY} 
                                    onChange={(e) => setPosY(parseInt(e.target.value))}
                                    className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                />
                            </div>

                            <div className="flex gap-3 pt-2">
                                <button onClick={resetControls} className="p-3 rounded-xl border-2 border-gray-200 text-gray-400 hover:bg-gray-50 transition-colors">
                                    <Icon name="rotate" className="w-6 h-6" />
                                </button>
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-xl border-2 border-pev-blue text-pev-blue font-bold hover:bg-pev-blue/5 transition-all uppercase text-sm"
                                >
                                    <Icon name="image" className="w-5 h-5" /> Changer
                                </button>
                                <button 
                                    onClick={handleDownload}
                                    disabled={!userImage || isExporting}
                                    className="flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-xl bg-pev-orange text-white font-bold shadow-lg shadow-pev-orange/30 hover:scale-[1.02] active:scale-95 disabled:opacity-50 disabled:scale-100 transition-all uppercase text-sm"
                                >
                                    {isExporting ? (
                                        <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                    ) : (
                                        <><Icon name="download" className="w-5 h-5" /> Télécharger</>
                                    )}
                                </button>
                            </div>
                        </div>
                    </main>

                    <input ref={fileInputRef} type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />

                    <footer className="mt-8 text-center text-gray-400 text-xs px-6 max-w-md">
                        <p>Note : Pour un résultat optimal, utilisez une photo bien éclairée.</p>
                        <p className="mt-2">© 2026 Programme Élargi de Vaccination - RDC</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
